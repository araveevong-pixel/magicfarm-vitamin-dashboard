name: Auto Update Dashboard

on:
  schedule:
    # ทุกวัน 09:00 AM เวลาไทย (02:00 UTC)
    - cron: '0 2 * * *'
    # ทุกวัน 17:00 PM เวลาไทย (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      actual_use:
        description: 'Update Actual Use amount (leave empty to skip)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run TikTok Scraper
        run: |
          cd scripts
          python3 tiktok_scraper.py ../scrape_results.json
          cat ../scrape_results.json

      - name: Update Dashboard with scraped data
        run: |
          cd scripts
          python3 update_dashboard.py ../scrape_results.json ../index.html

      - name: Update Actual Use (if provided)
        if: ${{ github.event.inputs.actual_use != '' }}
        run: |
          cd scripts
          python3 update_actual_use.py ${{ github.event.inputs.actual_use }} ../index.html

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-update dashboard $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
